# Run hourly cron (morning/evening pushes, rollover, brain status) via GitHub Actions.
# Vercel Hobby allows only 1 run/day per cron, so we trigger /api/cron/hourly from here.
#
# Required: Repository secrets OR variables (Settings → Secrets and variables → Actions):
#   CRON_SECRET   – same value as Vercel CRON_SECRET
#   PRODUCTION_URL – e.g. https://your-app.vercel.app (no trailing slash)

name: Cron hourly

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  trigger-hourly:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL || vars.PRODUCTION_URL }}
        run: |
          echo "CRON_SECRET is set: $([ -n \"$CRON_SECRET\" ] && echo 'yes' || echo 'no')"
          echo "PRODUCTION_URL is set: $([ -n \"$PRODUCTION_URL\" ] && echo 'yes' || echo 'no')"
          if [ -z "$CRON_SECRET" ] || [ -z "$PRODUCTION_URL" ]; then
            echo ""
            echo "Add under Settings → Secrets and variables → Actions:"
            echo "  Repository secrets (or Variables): CRON_SECRET, PRODUCTION_URL (exact names)"
            echo "  If this repo is a fork, add them in the fork; parent secrets are not used."
            exit 1
          fi
      - name: Call /api/cron/hourly
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL || vars.PRODUCTION_URL }}
        run: |
          resp=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$PRODUCTION_URL/api/cron/hourly")
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "Response ($code): $body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            exit 1
          fi
