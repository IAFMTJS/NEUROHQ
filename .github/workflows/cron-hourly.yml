# Run hourly cron (morning/evening pushes, rollover, brain status) via GitHub Actions.
# Vercel Hobby allows only 1 run/day per cron, so we trigger /api/cron/hourly from here.
#
# Required: Repository secrets OR variables (Settings → Secrets and variables → Actions):
#   CRON_SECRET   – same value as Vercel CRON_SECRET
#   PRODUCTION_URL – e.g. https://your-app.vercel.app (no trailing slash)
# Optional (if using Vercel Deployment Protection):
#   VERCEL_AUTOMATION_BYPASS_SECRET – from Vercel → Settings → Deployment Protection → Protection Bypass for Automation

name: Cron hourly

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  trigger-hourly:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL || vars.PRODUCTION_URL }}
        run: |
          # Trim whitespace; treat empty or whitespace-only as unset
          CRON_SECRET="${CRON_SECRET#"${CRON_SECRET%%[![:space:]]*}"}"
          CRON_SECRET="${CRON_SECRET%"${CRON_SECRET##*[![:space:]]}"}"
          PRODUCTION_URL="${PRODUCTION_URL#"${PRODUCTION_URL%%[![:space:]]*}"}"
          PRODUCTION_URL="${PRODUCTION_URL%"${PRODUCTION_URL##*[![:space:]]}"}"
          echo "CRON_SECRET is set: $([ -n \"$CRON_SECRET\" ] && echo 'yes' || echo 'no') (length: ${#CRON_SECRET})"
          echo "PRODUCTION_URL is set: $([ -n \"$PRODUCTION_URL\" ] && echo 'yes' || echo 'no') (length: ${#PRODUCTION_URL})"
          missing=""
          [ -z "$CRON_SECRET" ] && missing="CRON_SECRET"
          [ -z "$PRODUCTION_URL" ] && missing="${missing:+$missing, }PRODUCTION_URL"
          if [ -n "$missing" ]; then
            echo ""
            echo "Missing or empty: $missing"
            echo "Add under Settings → Secrets and variables → Actions:"
            echo "  Repository secrets (or Variables): CRON_SECRET, PRODUCTION_URL (exact names, case-sensitive)"
            echo "  If this repo is a fork, add them in the fork; parent secrets are not used."
            echo "  Scheduled runs use this repo's secrets; ensure they are set in this repository."
            exit 1
          fi
      - name: Call /api/cron/hourly
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET || vars.CRON_SECRET }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL || vars.PRODUCTION_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET || vars.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "VERCEL_AUTOMATION_BYPASS_SECRET is set: $([ -n \"$VERCEL_AUTOMATION_BYPASS_SECRET\" ] && echo 'yes' || echo 'no')"
          CRON_URL="$PRODUCTION_URL/api/cron/hourly"
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            CRON_URL="$CRON_URL?x-vercel-protection-bypass=$(printf '%s' "$VERCEL_AUTOMATION_BYPASS_SECRET" | jq -sRr @uri)"
          fi
          CURL_HEADERS=(-H "Authorization: Bearer $CRON_SECRET")
          [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ] && CURL_HEADERS+=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
          resp=$(curl -s -w "\n%{http_code}" -X GET "${CURL_HEADERS[@]}" "$CRON_URL")
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "Response ($code): $body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo ""
            if [ "$code" = "401" ]; then
              echo "401 Unauthorized: CRON_SECRET in GitHub must match CRON_SECRET in Vercel (same value)."
            elif [ "$code" = "404" ]; then
              echo "404: PRODUCTION_URL may be wrong or /api/cron/hourly is not deployed."
            elif [ "$code" = "302" ]; then
              echo "302 Redirect: Request is being redirected before hitting the cron API."
              echo "  → Usually caused by Vercel Deployment Protection."
              echo "  → Fix: Enable Protection Bypass for Automation in Vercel, then add secret here:"
              echo "  → Vercel: Settings → Deployment Protection → Protection Bypass for Automation (copy secret)"
              echo "  → GitHub: Settings → Secrets → VERCEL_AUTOMATION_BYPASS_SECRET (paste same value)"
            fi
            exit 1
          fi
